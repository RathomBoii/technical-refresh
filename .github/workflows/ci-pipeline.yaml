# .github/workflows/build-push-ecr.yml
name: Build and Push to ECR

on:
  push: 
    tags:
        - 'v*'      # Triggers for tags starting with 'v', like v1.0, v2.1.3
        - 'release/**' # Triggers for tags in the 'release/' folder

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.ref_name }}  
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}

jobs:
  # sast:
  #   name: SAST — Semgrep Code Pattern
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #   container:
  #     image: semgrep/semgrep
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         ref: ${{ github.event.release.tag_name }}

  #     - name: Run Semgrep
  #       run: semgrep --config=auto --severity=ERROR --error .

  echo-message:
    name: Echo Build Information
    runs-on: ubuntu-latest
    steps:
      - name: Print Environment Variables
        run: |
          echo "AWS_REGION: $AWS_REGION"
          echo "IMAGE_TAG: $IMAGE_TAG"

  human-approval:
    name: Manual Approval
    needs: echo-message
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Awaiting Manual Approval
        run: echo "Waiting for manual approval to proceed with build and push to ECR..."
      - name: Echo Approval Granted
        if: ${{ github.event.workflow_run.conclusion == 'approved' }}
        run: echo "Manual approval granted. Proceeding with build and push to ECR."
      # - name: Create PR to k8s repo
      #   uses: peter-evans/create-pull-request@v6
      #   with:
      #     token: ${{ secrets.K8S_REPO_TOKEN }}
      #     commit-message: "chore: update image to ${{ env.IMAGE_TAG }}"
      #     branch: "release/${{ env.IMAGE_TAG }}"
      #     title: "🚀 Deploy ${{ env.IMAGE_TAG }} to production"
      #     body: |
      #       ## Deploy Summary
      #       - Image: `${{ env.ECR_IMAGE }}`
      #       - Trivy scan: ✅ Passed
      #       - Triggered by: ${{ github.actor }}




  build-scan-push:
    name: Build → Scan → Push
    needs: human-approval          # Wait for manual approval before building and pushing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write            # OIDC

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-build-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker build
        run: |
          docker build \
            -f eks-private-cluster/app/app/Dockerfile \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            eks-private-cluster/app/app

      # - name: Trivy image scan
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     scan-type: image
      #     image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
      #     severity: CRITICAL,HIGH
      #     exit-code: '1'         # fail if CRITICAL/HIGH severity found

      - name: Push to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  update-argocd-values:
    name: Update ArgoCD Target Image Tag
    needs: build-scan-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update Helm values for app
        uses: mikefarah/yq@v4
        with:
          cmd: |
            yq -i '.image.repository = strenv(ECR_IMAGE)' eks-private-cluster/k8s/charts/app/values-dev.yaml
            yq -i '.image.tag = strenv(IMAGE_TAG)' eks-private-cluster/k8s/charts/app/values-dev.yaml
        env:
          ECR_IMAGE: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit and push updated values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eks-private-cluster/k8s/charts/app/values-dev.yaml
          git diff --cached --quiet || git commit -m "ci: update app image tag to ${IMAGE_TAG}" # --cached to commit only if there are changes and --quiet to skip commit if no changes and git diff is used to check if there are changes to commit
          git push origin main
