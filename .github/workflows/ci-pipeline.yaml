# .github/workflows/build-push-ecr.yml
name: Build and Push to ECR

on:
  push: 
    tags:
        - 'v*'      # Triggers for tags starting with 'v', like v1.0, v2.1.3
        - 'release/**' # Triggers for tags in the 'release/' folder

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.ref_name }}  
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}

permissions:
  contents: write        # allow create-pull-request to push a branch
  pull-requests: write   # allow create-pull-request to open a PR
  id-token: write        # OIDC for AWS credential federation

jobs:
  sast:
    name: SAST — Semgrep Code Pattern
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Run Semgrep (report only — does not block pipeline)
        continue-on-error: true   # findings are reported in logs but do NOT fail the job
        run: |
          # Scan entire repo (default)
          semgrep --config=auto --severity=ERROR --json-output=semgrep-report.json . || true

          # --- Uncomment below to scan a specific directory instead ---
          # semgrep --config=auto --severity=ERROR --json-output=semgrep-report.json \
          #   app/oil_price || true

          # --- Uncomment to scan multiple specific paths ---
          # semgrep --config=auto --severity=ERROR --json-output=semgrep-report.json \
          #   app/oil_price \
          #   clean-architecture-app/src || true

      - name: Print Semgrep Summary
        if: always()
        run: |
          if [ -f semgrep-report.json ]; then
            echo "=== Semgrep findings ==="
            python3 -c "
          import json, sys
          data = json.load(open('semgrep-report.json'))
          results = data.get('results', [])
          if not results:
              print('No findings.')
              sys.exit(0)
          print(f'Total findings: {len(results)}')
          for r in results:
              print(f\"  [{r['extra']['severity']}] {r['check_id']} — {r['path']}:{r['start']['line']}\")
            "
          fi

      - name: Upload Semgrep report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

  echo-message:
    name: Echo Build Information
    runs-on: ubuntu-latest
    steps:
      - name: Print Environment Variables
        run: |
          echo "AWS_REGION: $AWS_REGION"
          echo "IMAGE_TAG: $IMAGE_TAG"

  human-approval:
    name: Manual Approval
    needs: echo-message
    runs-on: ubuntu-latest
    environment: production      # ← GitHub pauses here, waits for reviewer approval before any step runs

    steps:
      - name: Awaiting Manual Approval
        run: echo "Waiting for manual approval to proceed with build and push to ECR..."
      - name: Echo Approval Granted
        if: ${{ github.event.workflow_run.conclusion == 'approved' }}
        run: echo "Manual approval granted. Proceeding with build and push to ECR."

  build-scan-push:
    name: Build → Scan → Push
    needs: human-approval          # Wait for manual approval before building and pushing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write            # OIDC

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-build-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker build
        run: |
          docker build \
            -f app/oil_price/Dockerfile \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            app/oil_price

      - name: Trivy image scan (report only — does not block pipeline)
        id: trivy
        continue-on-error: true   # findings are reported but do NOT fail the job
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: '0'          # never fail — report only
          format: table           # human-readable summary printed to logs
          output: trivy-report.txt

      # --- Uncomment to BLOCK the pipeline on CRITICAL/HIGH vulnerabilities ---
      # - name: Trivy image scan (blocking)
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     scan-type: image
      #     image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
      #     severity: CRITICAL,HIGH
      #     exit-code: '1'        # fail job if CRITICAL/HIGH found

      - name: Print Trivy Summary
        if: always()
        run: |
          if [ -f trivy-report.txt ]; then
            echo "=== Trivy Scan Results ==="
            cat trivy-report.txt
          else
            echo "No Trivy report generated."
          fi

      - name: Upload Trivy report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

      - name: Push to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  open-deploy-pr:
    name: Update Image Tag and Open PR
    needs: build-scan-push         # Image must be in ECR before opening the PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tag in Helm values
        uses: mikefarah/yq@v4
        with:
          cmd: |
            yq -i '.image.repository = strenv(ECR_IMAGE)' eks-private-cluster/k8s/charts/app/values-prod.yaml
            yq -i '.image.tag = strenv(IMAGE_TAG)' eks-private-cluster/k8s/charts/app/values-prod.yaml
        env:
          ECR_IMAGE: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Check git diff
        run: git diff

      - name: Create PR for image tag update
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub on every run — no setup needed.
          # Requires repo Settings → Actions → General → Workflow permissions:
          #   ✅ "Read and write permissions"
          #   ✅ "Allow GitHub Actions to create and approve pull requests"
          # token: ${{ secrets.K8S_REPO_TOKEN }}  # Swap to a PAT only if targeting a separate repo
          base: main
          commit-message: "chore: update image to ${{ env.IMAGE_TAG }}"
          branch: "release/${{ env.IMAGE_TAG }}"
          title: "🚀 Deploy ${{ env.IMAGE_TAG }} to production"
          body: |
            ## Deploy Summary
            - Image: `${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}`
            - Trivy scan: ✅ Passed
            - Triggered by: ${{ github.actor }}
     
      - name: Show PR URL                         # ← confirm it was created
        if: ${{ steps.cpr.outputs.pull-request-url }}
        run: echo "::notice::PR created at ${{ steps.cpr.outputs.pull-request-url }}"