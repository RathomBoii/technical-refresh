# ── Grafana: standalone chart values (prod) ───────────────────────────────────
# Used by: eks-private-cluster/k8s/gitops/argocd/applications/grafana/argocd-grafana.yaml
# Chart:   grafana/grafana  chart 10.5.15  (Grafana app 12.3.1)
#
# ── How this file works ───────────────────────────────────────────────────────
# The Grafana Helm chart ships a full default values.yaml (1833 lines) that
# contains every possible configuration key with its default value.
# Source (authoritative): https://github.com/grafana/helm-charts/blob/main/charts/grafana/values.yaml
#
# This file is an OVERRIDE file — you only need to declare the keys you want
# to change from the defaults. Helm deep-merges the two at deploy time:
#
#   Chart default values.yaml  (base — every key, mostly disabled/empty)
#            +
#   This values-prod.yaml      (overrides — only what we explicitly set)
#            =
#   Final rendered Kubernetes manifests
#
# Example: the chart default for persistence.enabled is `false` and size is
# `10Gi`. By writing `enabled: true` and `size: 5Gi` below, only those two
# keys are overridden — everything else in persistence: stays at the default.
#
# To find available keys: browse the default values.yaml linked above.
# Every key documented there can be overridden here.
# ─────────────────────────────────────────────────────────────────────────────

# ── Admin credentials ─────────────────────────────────────────────────────────
# Option A (current): plaintext — fine for local dev, not for prod
# adminUser: admin
# adminPassword: "changeme"
#
# Option B (recommended for prod): reference a pre-existing Kubernetes Secret.
# The chart injects the secret value as the GF_SECURITY_ADMIN_PASSWORD env var.
#
# Step 1 — store the password in AWS Secrets Manager:
#   aws secretsmanager create-secret \
#     --name prod/grafana/admin \
#     --secret-string '{"username":"admin","password":"<strong-password>"}'
#
# Step 2 — create an ExternalSecret CR to sync it into a Kubernetes Secret:
#   (place this in eks-private-cluster/k8s/gitops/argocd/values/grafana/external-secret.yaml)
#
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret
#   metadata:
#     name: grafana-admin-secret
#     namespace: monitoring
#   spec:
#     refreshInterval: 1h
#     secretStoreRef:
#       name: aws-secrets-manager      # your ClusterSecretStore name
#       kind: ClusterSecretStore
#     target:
#       name: grafana-admin-secret     # Kubernetes Secret name created below
#       creationPolicy: Owner
#     data:
#       - secretKey: admin-user        # key inside the K8s Secret
#         remoteRef:
#           key: prod/grafana/admin    # AWS Secrets Manager secret name
#           property: username
#       - secretKey: admin-password
#         remoteRef:
#           key: prod/grafana/admin
#           property: password
#
# Step 3 — reference the Kubernetes Secret here (Option B below):
# Option A (current): plaintext — fine for local dev, not for prod
# adminUser: admin
# adminPassword: "changeme"  # ← swap to Option B for prod

# *Option B (uncomment when ExternalSecret is in place, remove the two lines above):
admin:
  existingSecret: grafana-credentials  # name of the K8s Secret created by ExternalSecret
  userKey: admin_user                  # key inside the Secret for the username
  passwordKey: admin_password          # key inside the Secret for the password

# ── Resource limits ───────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# ── Persistent storage ────────────────────────────────────────────────────────
# Disabled: SQLite on disk replaced by external PostgreSQL (RDS).
# All state (dashboards, users, alerting) is stored in the RDS instance.
# See grafana.ini.database section below.
persistence:
  enabled: false

# ── External PostgreSQL database (RDS) ───────────────────────────────────────
# Grafana expands ${ENV_VAR} references inside grafana.ini at startup.
# GF_DATABASE_PASSWORD is injected from a Kubernetes Secret (see `env` below).
#
# Pre-requisite — ExternalSecret to sync the RDS password from Secrets Manager:
#
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret
#   metadata:
#     name: grafana-db-secret
#     namespace: monitoring
#   spec:
#     refreshInterval: 1h
#     secretStoreRef:
#       name: aws-secrets-manager
#       kind: ClusterSecretStore
#     target:
#       name: grafana-db-secret
#       creationPolicy: Owner
#     data:
#       - secretKey: password
#         remoteRef:
#           key: <value of terraform output db_password_secret_arn>
#           property: password   # adjust to the JSON key inside the secret
#
# Get the RDS hostname:  terraform -chdir=eks-private-cluster/terraform output db_host
# What it does: At startup, Grafana reads this and opens a connection to your RDS instance 
# instead of creating grafana.db (SQLite) on disk. From that point, every dashboard save, 
# user login, alert rule, and API key is written to RDS instead of the local filesystem.
grafana.ini:
  database:
    type: postgres
    host: "${POSTGRES_HOST}:5432"   # replace with actual RDS hostname
    name: "${GF_DATABASE_NAME}"
    user: "${GF_DATABASE_USER}"
    password: "${GF_DATABASE_PASSWORD}"
    ssl_mode: require

# ── Database password injected as env var ─────────────────────────────────────
# Grafana resolves ${GF_DATABASE_PASSWORD} in grafana.ini at startup.
# The value comes from the K8s Secret created by the ExternalSecret above.
env:
  GF_DATABASE_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: grafana-credentials
        key: db_password
  GF_DATABASE_NAME:
    valueFrom:
      secretKeyRef:
        name: grafana-credentials
        key: db_name
  GF_DATABASE_USER:
    valueFrom:
      secretKeyRef:
        name: grafana-credentials
        key: db_user
  POSTGRES_HOST:
    valueFrom:
      secretKeyRef:
        name: grafana-credentials
        key: db_host

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false  # ingress managed by Traefik IngressRoute

# ── Datasources auto-provisioned on first boot ────────────────────────────────
# All three backends run in the same `monitoring` namespace so short DNS names resolve.
# Prometheus  → prometheus-operated:9090  (created by Prometheus Operator)
# Loki        → loki:3100
# Tempo       → tempo:3100
#
# ── All Services created by kube-prometheus-stack (kubectl get svc -n monitoring) ──
#
#  NAME                                      TYPE       PORT(S)               RESPONSIBILITY
#  ─────────────────────────────────────────────────────────────────────────────────────────
#  prometheus-operated                       Headless   9090, 10901           Operator-managed stable Service for Prometheus pods.
#                                                                             Always named "prometheus-operated" regardless of Helm
#                                                                             release name. Port 9090=HTTP metrics query,
#                                                                             10901=Thanos gRPC (sidecar ↔ Thanos Query).
#                                                                             USE THIS in Grafana datasource — name never changes.
#
#  prometheus-kube-prometheus-prometheus     ClusterIP  9090, 8080            User-facing Prometheus Service. Name is derived from
#                                                                             Helm release name so it changes if you rename the release.
#                                                                             Port 8080 = config-reloader metrics. Avoid using this
#                                                                             in other services — prefer prometheus-operated above.
#
#  alertmanager-operated                     Headless   9093, 9094, 9094/UDP  Operator-managed stable Service for AlertManager pods.
#                                                                             Same pattern as prometheus-operated — fixed name.
#                                                                             Port 9093=HTTP API/UI, 9094=cluster mesh (HA gossip).
#
#  prometheus-kube-prometheus-alertmanager   ClusterIP  9093, 8080            User-facing AlertManager Service (release-name-derived).
#                                                                             Port 9093=alerts/silences API, 8080=reloader metrics.
#                                                                             Use this if routing alerts from external tools.
#
#  prometheus-kube-prometheus-operator       ClusterIP  443                   The Prometheus Operator itself. Exposes a webhook
#                                                                             used by the Kubernetes API server to validate
#                                                                             Prometheus/AlertManager/ServiceMonitor CRs on admission.
#                                                                             Not a metrics endpoint — do not use in datasources.
#
#  prometheus-kube-state-metrics             ClusterIP  8080                  kube-state-metrics HTTP endpoint. Exports Kubernetes
#                                                                             object state as metrics (pod phase, deployment replicas,
#                                                                             node conditions, etc.). Scraped by Prometheus via a
#                                                                             ServiceMonitor — not used directly in Grafana.
#
#  prometheus-prometheus-node-exporter       ClusterIP  9100                  Node exporter HTTP endpoint (one pod per worker node,
#                                                                             exposed via this ClusterIP). Exports kernel-level host
#                                                                             metrics (CPU, memory, disk, network). Scraped by
#                                                                             Prometheus via a ServiceMonitor.
# ─────────────────────────────────────────────────────────────────────────────────────────
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      # ── Prometheus (default metrics datasource) ────────────────────────────
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus-operated.monitoring.svc:9090
        isDefault: true   # used as the default datasource in dashboards

      # ── Tempo (distributed tracing) ───────────────────────────────────────
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.monitoring.svc:3100
        jsonData:
          # Trace → Logs: click a span in Tempo → jump to Loki logs for that trace_id
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            filterByTraceID: true
            filterBySpanID: false
            customQuery: true
            query: '{job=~".+"} | json | trace_id=~"${__trace.traceId}"'
          # Trace → Metrics: link from Tempo spans to Prometheus metric explorer
          tracesToMetrics:
            datasourceUid: prometheus
          # Service graph: visualise request topology from span data
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          # Enable log search from within Tempo UI
          lokiSearch:
            datasourceUid: loki

      # ── Loki (log aggregation) ────────────────────────────────────────────
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.monitoring.svc:3100
        jsonData:
          # Logs → Traces: if a log line contains trace_id, show a link to Tempo
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"trace_id":"([a-f0-9]{32})"'
              name: TraceID
              url: "${__value.raw}"   # Grafana substitutes the captured trace_id
