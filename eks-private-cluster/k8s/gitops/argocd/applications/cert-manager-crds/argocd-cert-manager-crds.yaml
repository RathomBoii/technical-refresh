apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # deploys cert-manager operator before ClusterIssuer/Certificate (wave 1)
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io   # official cert-manager Helm registry
    chart: cert-manager
    targetRevision: v1.14.5
    helm:
      values: |
        crds:
          enabled: true   # install CRDs together with the operator (recommended by cert-manager)
          keep: true      # do not delete CRDs on prune — prevents losing all issued certs
        # Full operator deployed: controller + webhook + cainjector
        # ClusterIssuer and Certificate are managed by the separate cert-manager ArgoCD app (wave 1)
  destination:
    name: in-cluster
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    # ArgoCD's internal schema does not declare .status.terminatingReplicas on Deployments
    # causing structured merge diff to fail with ComparisonError — safe to ignore
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
