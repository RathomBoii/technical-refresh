apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # runs after cert-manager-crds (wave 0)
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: default
  source:
    repoURL: https://github.com/RathomBoii/technical-refresh.git
    targetRevision: main
    path: eks-private-cluster/k8s/charts/cert-manager
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    name: in-cluster
    namespace: traefik # cert-manager resources (ClusterIssuer, Certificate) deploy here so Traefik can read the traefik-tls Secret directly
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
