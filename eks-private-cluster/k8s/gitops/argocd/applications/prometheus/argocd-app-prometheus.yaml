# ── ArgoCD Application: Prometheus ────────────────────────────────────────────
# Apply this manifest with:  kubectl apply -f argocd-app-prometheus.yaml
#
# ArgoCD will:
#  1. Pull the upstream kube-prometheus-stack chart from the Helm registry
#  2. Render it with values-prod.yaml from this Git repo
#  3. Deploy only Prometheus + Operator into the monitoring namespace
#     (Grafana, Alertmanager, node-exporter, kube-state-metrics are disabled
#      in values-prod.yaml — each deployed separately or not needed yet)
#  4. Watch for changes in Git and auto-sync forever
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # ── Why resources are named "prometheus-kube-prometheus-prometheus" ───────────
  # The kube-prometheus-stack chart names its resources using the pattern:
  #   <release-name>-kube-prometheus-<component>
  # ArgoCD uses the Application name below as the Helm release name, so:
  #   "prometheus" + "kube-prometheus" + "prometheus" → prometheus-kube-prometheus-prometheus
  # This triple repetition is expected — it is not a misconfiguration.
  # To connect to Prometheus from other services (e.g. Grafana), use the stable
  # Service created by the Operator: prometheus-operated.monitoring.svc:9090
  # ─────────────────────────────────────────────────────────────────────────────
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground  # cascade-delete all Prometheus resources when this Application is deleted
spec:
  project: default

  # ── Why 2 sources? ───────────────────────────────────────────────────────────
  # ArgoCD cannot fetch a Helm chart and a Git file in a single source — they
  # live in different locations (Helm registry vs. Git repo).
  #
  # Source 1 pulls the kube-prometheus-stack chart package from the Helm registry.
  # Source 2 mounts this Git repo as a variable ($values) so Source 1 can
  # reference values-prod.yaml inside it via the valueFiles field.
  #
  # Alternative — inline values directly in Source 1 using `helm.values: |`:
  #   • No second source needed
  #   • But all config is embedded in this manifest, making it harder to read
  #     and requiring edits here for every config change
  #
  # The 2-source pattern keeps concerns separated:
  #   • This file       → chart version + ArgoCD sync behaviour (changes rarely)
  #   • values-prod.yaml → Prometheus config (changes often)
  # ─────────────────────────────────────────────────────────────────────────────
  sources:
    # Source 1: upstream kube-prometheus-stack chart from Helm registry
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "87.2.0"  # pin chart version — upgrade by changing this value
      helm:
        valueFiles:
          - $values/eks-private-cluster/k8s/gitops/argocd/values/prometheus/values-prod.yaml
          # $values is the alias created by Source 2 below — it resolves to the
          # root of this Git repo, so the path above points to our values file.

    # Source 2: this Git repo — not deployed, only used to expose $values alias
    - repoURL: https://github.com/RathomBoii/technical-refresh.git
      targetRevision: main
      ref: values  # ref: creates the $values variable referenced in Source 1 valueFiles

  destination:
    server: https://kubernetes.default.svc  # deploy into the same cluster ArgoCD lives in
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true      # delete resources removed from Git
      selfHeal: true   # revert manual kubectl changes back to Git state
    syncOptions:
      - CreateNamespace=true  # auto-create monitoring namespace
      - ServerSideApply=true  # required — kube-prometheus-stack has large CRDs that exceed kubectl apply limits
