# ── ArgoCD Application: Prometheus ────────────────────────────────────────────
# Apply this manifest with:  kubectl apply -f argocd-app-prometheus.yaml
#
# ArgoCD will:
#  1. Clone the repo
#  2. Find the chart at the path below
#  3. Run helm dependency update to pull kube-prometheus-stack
#  4. Render the chart with values.yaml (values-prod.yaml)
#  5. Deploy all Prometheus/Grafana resources into the monitoring namespace
#  6. Watch for changes in Git and auto-sync forever
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground  # cascade-delete all Prometheus resources when this Application is deleted
spec:
  project: default

  sources:
    # Source 1: upstream kube-prometheus-stack chart from Helm repo (no wrapper chart needed)
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "72.3.0"  # pin chart version — upgrade by changing this value
      helm:
        valueFiles:
          - $values/eks-private-cluster/k8s/values/prometheus/values-prod.yaml

    # Source 2: this Git repo — only used to provide the values file via $values reference above
    - repoURL: https://github.com/RathomBoii/technical-refresh.git
      targetRevision: main
      ref: values  # exposes this source as $values variable used in valueFiles above

  destination:
    server: https://kubernetes.default.svc  # deploy into the same cluster ArgoCD lives in
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true      # delete resources removed from Git
      selfHeal: true   # revert manual kubectl changes back to Git state
    syncOptions:
      - CreateNamespace=true  # auto-create monitoring namespace
      - ServerSideApply=true  # required — kube-prometheus-stack has large CRDs that exceed kubectl apply limits
