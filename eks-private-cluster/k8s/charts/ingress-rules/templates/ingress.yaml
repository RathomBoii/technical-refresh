spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - {{ .Values.domains.grafana }}
    secretName: grafana-tls
  rules:
  - host: {{ .Values.domains.grafana }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.grafana.serviceName }}
            port:
              number: {{ .Values.grafana.port }}
