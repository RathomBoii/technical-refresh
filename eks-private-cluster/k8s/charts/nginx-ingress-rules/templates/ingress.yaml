# ── Ingress for Hello World (namespace: default) ─────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helloworld-ingress
  namespace: {{ .Values.helloworld.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: / # <=  rewrites the URL path before forwarding the request to the backend service. Browser → app.wolffialampang.com/api/hello, NGINX forwards → helloworld-svc:8000/  because hellowworld app only has / path         ✅ (path stripped, replaced with /)
    cert-manager.io/cluster-issuer: "letsencrypt-prod" # <= reference the ClusterIssuer named "letsencrypt-prod" for cert-manager to read the tls configuration in that ClusterIssuer and issue certs for this Ingress
spec:
  ingressClassName: nginx # <= specify the ingressClass to use (which ingress controller should manage this Ingress) which already registered via the helm iupgrade command when install nginx ingress controller.
  tls:
  - hosts:
    - {{ .Values.domains.app }}
    secretName: helloworld-tls
  rules:
  - host: {{ .Values.domains.app }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.helloworld.serviceName }}
            port:
              number: {{ .Values.helloworld.port }}
---
# ── Ingress for ArgoCD (namespace: argocd) ────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: {{ .Values.argocd.namespace }}
  annotations:
  # [Client]  ←── leg 1 ───→  [NGINX]  ←── leg 2 ───→  [ArgoCD pod]
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP" #backend-protocol: "HTTP" controls leg 2 (NGINX → ArgoCD) because the officail ArgoCD default listener on https, add this annotation is telling argocd to accept http traffic from NGINX, and NGINX will handle the SSL termination and forward the request to ArgoCD over HTTP. If this annotation is not set, NGINX will try to communicate with ArgoCD over HTTPS, which may cause issues if ArgoCD is not configured to handle HTTPS traffic.
    nginx.ingress.kubernetes.io/ssl-redirect: "true" # ssl-redirect: "true" controls leg 1 (Client → NGINX)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - {{ .Values.domains.argocd }}
    secretName: argocd-tls
  rules:
  - host: {{ .Values.domains.argocd }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.argocd.serviceName }}
            port:
              number: {{ .Values.argocd.port }}
---
# ── Ingress for Grafana (namespace: monitoring) ───────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: {{ .Values.grafana.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - {{ .Values.domains.grafana }}
    secretName: grafana-tls
  rules:
  - host: {{ .Values.domains.grafana }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.grafana.serviceName }}
            port:
              number: {{ .Values.grafana.port }}
