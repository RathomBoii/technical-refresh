namespace: traefik

serviceAccountName: traefik-service-account

loadBalancer:
  # Set public subnet IDs explicitly if AWS LBC cannot auto-discover subnets.
  # Example:
  # subnetIds:
  #   - subnet-xxxxxxxxxxxxxxxxx
  #   - subnet-yyyyyyyyyyyyyyyyy
  #
  # ⚠️  IMPORTANT: If NLB stays <pending>, verify AWS Load Balancer Controller
  # was installed with the correct --set clusterName=<your-cluster-name>.
  # LBC uses clusterName to match subnet tag: kubernetes.io/cluster/<clusterName>=shared
  # Mismatch causes: "2 are tagged for other clusters" error.
  # Fix: helm upgrade aws-load-balancer-controller ... --set clusterName=eks-prod
  subnetIds: 
    - subnet-005aaaeb0ba0989f6
    - subnet-000a1a1f863832af2

image:
  repository: traefik
  tag: "v3.0.0"

deployment:
  replicas: 2

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

domains:
  app: app.wolffialampang.com
  userApp: userapp.wolffialampang.com
  prometheusApp: prometheus.wolffialampang.com
  argocd: argocd.wolffialampang.com
  grafana: grafana.wolffialampang.com
  traefik: traefik.wolffialampang.com


app:
  serviceName: app-service
  namespace: prod-app

argocd:
  serviceName: argocd-server   # helm upgrade created this name (no release prefix)
  namespace: argocd
  port: 80
  enabled: true

userApp:
  serviceName: "user-service"
  namespace: prod-app
  port: 3000
  enabled: false

grafana:
  serviceName: prometheus-grafana
  namespace: monitoring
  port: 80
  enabled: true

prometheus:
  serviceName: prometheus-kube-prometheus-prometheus
  namespace: monitoring
  port: 9090
  enabled: true

# External Secrets Operator — pulls BasicAuth credentials from AWS Secrets Manager.
# AWS SM secrets must exist before syncing this chart:
#   aws secretsmanager create-secret --name traefik/dashboard-auth \
#     --secret-string '{"users":"admin:<htpasswd-bcrypt-hash>"}'
#   aws secretsmanager create-secret --name traefik/monitoring-auth \
#     --secret-string '{"users":"admin:<htpasswd-bcrypt-hash>"}'
eso:
  enabled: true
  clusterSecretStoreName: secret-store  # must match secretStore.name in secret-store values-prod.yaml
  refreshInterval: "1h"
  dashboardAuth: 
    name: "traefik-dashboard-auth"     # must match the middleware name referenced in ingressroute.yaml
    secretName: traefik-dashboard-auth-secret
  monitoringAuth: 
    name: "traefik-monitoring-auth"            # must match the middleware name referenced in ingressroute.yaml
    secretName: traefik-monitoring-auth-secret