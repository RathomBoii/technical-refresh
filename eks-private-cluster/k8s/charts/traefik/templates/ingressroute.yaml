apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: main-app-ingressroute
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure # 443
  routes:
    - match: "Host(`{{ .Values.domains.helloworldApp }}`)"
      kind: Rule
      services:
        - name: {{ .Values.helloworld.serviceName }}
          namespace: {{ .Values.helloworld.namespace }}
          port: 3000
    - match: "Host(`{{ .Values.domains.userApp }}`)"
      kind: Rule
      services:
        - name: {{ .Values.userApp.serviceName }}
          namespace: {{ .Values.userApp.namespace }}
          port: 3000
    - match: "Host(`{{ .Values.domains.prometheusApp }}`)"
      kind: Rule
      services:
        - name: {{ .Values.prometheus.serviceName }}
          namespace: {{ .Values.prometheus.namespace }}
          port: 3000
    # ArgoCD: must run with --insecure flag so it accepts plain HTTP from Traefik
    # [Client] ──HTTPS──▶ Traefik (terminates TLS) ──HTTP──▶ ArgoCD service:80 ──▶ pod:8080
    - match: "Host(`{{ .Values.domains.argocd }}`)"
      kind: Rule
      services:
        - name: {{ .Values.argocd.serviceName }}
          namespace: {{ .Values.argocd.namespace }}
          port: 80  # ArgoCD Service port 80 maps to container port 8080 when --insecure is set
    # Grafana: must run with --insecure flag so it accepts plain HTTP from Traefik
    # [Client] ──HTTPS──▶ Traefik (terminates TLS) ──HTTP──▶ Grafana pod:3000
    - match: "Host(`{{ .Values.domains.grafana }}`)"
      kind: Rule
      services:
        - name: {{ .Values.grafana.serviceName }}
          namespace: {{ .Values.grafana.namespace }}
          port: 3000  # Grafana HTTP port (not 443), requires --insecure on grafana-server
  # routes:
  # - match: Host(`example.com`) && PathPrefix(`/api`)
  #   kind: Rule
  #   services:
  #     - name: api-svc
  #       port: 3000

  # - match: Host(`example.com`) && PathPrefix(`/dashboard`)
  #   kind: Rule
  #   services:
  #     - name: dashboard-svc
  #       port: 4000

  # - match: Host(`example.com`) && PathPrefix(`/`)
  #   kind: Rule
  #   services:
  #     - name: frontend-svc
  #       port: 3000
  tls:
    # cert-manager issues the cert and stores it in this Secret.
    # The Secret is created by a Certificate resource in k8s/manifests/cluster-issuer.yaml
    secretName: traefik-tls