domains:
  appApp: "hellowworld.example.com"
  userApp: "user.example.com"
  prometheusApp: "prometheus.example.com"
  argocd: "argocd.example.com"

argocd:
  serviceName: argocd-server
  namespace: argocd

image:
  repository: traefik
  tag: "v3.0.0"

deployment:
  replicas: 2

ingressRoute:
  dashboard:
    enabled: true
    entryPoints: ["websecure"]

ports:
  web:
    redirectTo:
      port: websecure
  websecure:
    tls:
      enabled: true

certResolvers:
  letsencrypt:
    email: [email-address]
    tlsChallenge: true

logs:
  general:
    level: INFO
  access:
    enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# External Secrets Operator — pulls BasicAuth credentials from AWS Secrets Manager.
# Set enabled: true in environment values to activate.
eso:
  enabled: false
  clusterSecretStoreName: secret-store  # must match secretStore.name in secret-store chart
  refreshInterval: "1h"
  dashboardAuth:
    name: "traefik-dashboard-auth"
    secretName: traefik-dashboard-auth-secret
  monitoringAuth:
    name: "monitoring-auth"
    secretName: monitoring-auth-secret
