#  externalSecret is the storage to store the secrets fetched by secretStore from AWS Secret Manager. It will create a k8s Secret with the same name as specified in target.name 
#  and store the secrets fetched from AWS Secret Manager in it. The k8s Secret can then be referenced by other resources like Deployment, Ingress, etc.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.appExternalSecret.name }}
  namespace: {{ .Values.appExternalSecret.namespace | default "default" }} # the namespace where the k8s Secret will be created. Must match the namespace of the consuming resources (e.g. Deployment) that will reference this secret.
spec:
  refreshInterval: 1h # allows us to update secret. Be aware of API limits for AWS if doing shorter intervals.
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.secretStore.name }} # the Secret Store we defined in secret-store.yaml. This is where the ExternalSecret will request the secrets from.
  target:
    name: {{ .Values.appExternalSecret.name }} # name of the k8s Secret to be created which can be pointed by envFrom or secretKeyRef in the Deployment. This Secret will be automatically created and updated by the ExternalSecret controller based on the data fetched from AWS Secret Manager.
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: {{ .Values.appExternalSecret.key }} #! Name of AWS Secret Manager to be fetched, it will be JSON.
      conversionStrategy: Default # Default means the controller will try to parse the secret value as JSON and create individual keys in the k8s Secret. If parsing fails, it will fallback to using the whole value as a single key named "value". None means no parsing, the whole secret value will be stored in a single key named "value" in the k8s Secret.
      decodingStrategy: None # None means the secret value will be stored as-is without base64 decoding. This is useful when the secret value is a plain string. If your secret value is base64 encoded, you can set this to Base64 to have it automatically decoded before storing in the k8s Secret.
      metadataPolicy: None # None means no metadata from the AWS secret will be stored in the k8s Secret. If you want to store metadata like version, ARN, etc., you can set this to Include and it will create additional keys in the k8s Secret for the metadata.
  # - extract:
  #     key: {{ .Values.appExternalSecret.key2 }} #! You can have multiple dataFrom entries to fetch multiple secrets from AWS Secret Manager and store them in the same k8s Secret. Each entry will be merged into the same k8s Secret.
  #     conversionStrategy: Default
  #     decodingStrategy: None
---
# =============================================================================
# TRAEFIK MIDDLEWARE AUTH SECRETS
# Placed here to keep all ExternalSecret definitions in the secret-store chart.
# These secrets must land in the traefik namespace so Traefik Middleware can
# reference them directly (Traefik only looks up secrets in its own namespace).
# The ClusterSecretStore is cluster-scoped so it can create secrets in any namespace.
# =============================================================================

# Traefik dashboard BasicAuth — consumed by Middleware/traefik-dashboard-auth
{{- if .Values.traefikDashboardAuthExternalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.traefikDashboardAuthExternalSecret.name | default "traefik-dashboard-auth-secret" }}
  namespace: traefik  # must match Traefik's namespace — Middleware references secrets by name within its own namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.secretStore.name }}
  target:
    name: {{ .Values.traefikDashboardAuthExternalSecret.name | default "traefik-dashboard-auth-secret" }}  #! must match spec.basicAuth.secret in traefik middleware.yaml
    creationPolicy: Owner
  data:
  - secretKey: users          # key name in the K8s Secret (Traefik requires "users")
    remoteRef:
      key: {{ .Values.traefikDashboardAuthExternalSecret.key }}  # AWS SM secret: JSON {"users": "admin:$hash"}
      property: password #! pick the "password" property from the JSON secret to store in the k8s Secret
  # dataFrom:
  #   - extract:
  #       key: {{ .Values.traefikDashboardAuthExternalSecret.key }}  # AWS SM secret
  #       conversionStrategy: Default
  #       decodingStrategy: None
  #       metadataPolicy: None
{{- end }}
---
# Monitoring BasicAuth — consumed by Middleware/monitoring-auth (Prometheus + Grafana)
{{- if .Values.grafanaMonitoringAuthExternalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.grafanaMonitoringAuthExternalSecret.name | default "grafana-monitoring-auth-secret" }}
  namespace: traefik  # must match Traefik's namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.secretStore.name }}
  target:
    name: {{ .Values.grafanaMonitoringAuthExternalSecret.name | default "grafana-monitoring-auth-secret" }}  #! must match spec.basicAuth.secret in traefik middleware.yaml
    creationPolicy: Owner
  data:
    - secretKey: users          # Traefik basicAuth requires the K8s Secret to have a key named "users"
      remoteRef:
        key: {{ .Values.grafanaMonitoringAuthExternalSecret.key }}  # AWS SM secret name
        property: password      # pick the "password" field from the JSON — must contain htpasswd hash: admin:$2y$05$...
{{- end }}