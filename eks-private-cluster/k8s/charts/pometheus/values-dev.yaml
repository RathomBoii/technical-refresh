# ── Dev environment overrides ─────────────────────────────────────────────────
kube-prometheus-stack:

  grafana:
    adminPassword: "admin"  # simple password for dev only

    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  prometheus:
    prometheusSpec:
      retention: 7d  # short retention for dev to save disk
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

  alertmanager:
    enabled: false  # no alerting needed in dev
