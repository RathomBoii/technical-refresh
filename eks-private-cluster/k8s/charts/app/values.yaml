replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent


serviceAccount:
  roleArn: "arn:aws:iam::687069305167:role/prod-app"  # Set in values-dev/prod.yaml — IAM role ARN from terraform output

secrets:
  enabled: false          # Set true once app-secrets K8s Secret exists (synced by ESO)
  secretName: app-secrets # Name of the K8s Secret — all keys become env vars via envFrom
                          # Expected keys: API_KEY, DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
  # Example:
  # envVars:
  #   - name: API_KEY
  #     secretName: app-secrets
  #     key: API_KEY
service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Phase 1: Prometheus metrics scraping ────────────────────────────────────
metrics:
  enabled: true
  # Must match the Helm release name of kube-prometheus-stack so the Prometheus
  # operator discovers this ServiceMonitor via label selector.
  prometheusRelease: prometheus

# ── Phase 3: OpenTelemetry tracing ──────────────────────────────────────────
otel:
  # gRPC endpoint for Tempo (host:port, no scheme).
  # Set to "" to disable export (safe for local dev without Tempo running).
  endpoint: ""

# ── Phase 5: Symptom-based alerting rules ───────────────────────────────────
alerting:
  enabled: true
