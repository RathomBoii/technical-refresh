apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: app
    env: {{ .Values.env }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
        env: {{ .Values.env }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: {{ .Values.env | quote }}
            {{- if .Values.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            {{- end }}
          {{- if .Values.secrets.enabled }}
          # OPTION 1 (current): envFrom — injects all secret keys as env vars at pod start.
          # Simple, works with os.environ. Requires rollout restart after secret rotation and also secret replacement (e.g. kubectl delete secret <secret-name>) in order to trigger the ESO sync and update the env vars in the pod.
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.secretName }}
                # All keys from this K8s Secret become env vars automatically:
                # API_KEY, DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
                # ESO syncs these from AWS Secrets Manager (prod/app)
          # OPTION 2 (commented): Volume mount — mounts each secret key as a file under /etc/secrets/.
          # K8s auto-refreshes file contents ~1 min after Secret update (no pod restart needed).
          # Trade-off: app must read files via pathlib.Path("/etc/secrets/<KEY>").read_text()
          #            instead of os.environ.get("<KEY>"). os.environ will NOT reflect updates.
          # volumeMounts:
          #   - name: app-secrets
          #     mountPath: /etc/secrets
          #     readOnly: true
          {{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      # OPTION 2 (commented): volumes block — required when using volumeMounts above.
      # Pair this with the volumeMounts section in the container spec.
      # volumes:
      #   - name: app-secrets
      #     secret:
      #       secretName: {{ .Values.secrets.secretName }}
      #       # Each key in the K8s Secret becomes a separate file:
      #       #   /etc/secrets/API_KEY, /etc/secrets/DB_HOST, /etc/secrets/DB_PORT, etc.
      #       # K8s kubelet refreshes these files automatically when the Secret changes.