{{- if .Values.secrets.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secrets.providerClass }}
  namespace: {{ .Values.namespace }}
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "/prod/helloworld/api-key"
      # "/prod/helloworld/api-key" <= the actual secret name in AWS Secret Manager (Plain text type)
        objectType: secretsmanager
        objectAlias: "api-key"   # filename used in the volume mount at mountPath/api-key

      # ── Key/value (JSON) secret example ───────────────────────────────────────
      # Use this when the secret value is a JSON object, e.g.:
      #   {"DB_PASSWORD": "s3cr3t", "DB_USER": "admin"}
      # jmesPath extracts individual fields from the JSON into separate aliases.
      #
      # - objectName: "/prod/helloworld/db-credentials"
      #   objectType: secretsmanager
      #   jmesPath:
      #     - path: DB_PASSWORD      # JSON key to extract
      #       objectAlias: db-password
      #     - path: DB_USER
      #       objectAlias: db-user
      # ──────────────────────────────────────────────────────────────────────────

  # Syncs the mounted secret into a native Kubernetes Secret so the pod can
  # read it as an env var via secretKeyRef (in addition to the volume mount).
  secretObjects:
    - secretName: helloworld-secrets   # K8s Secret name — referenced in deployment envVars
      type: Opaque
      data:
        - objectName: "api-key"
          key: API_KEY              # key inside the K8s Secret

        # ── Key/value (JSON) secret example ─────────────────────────────────────
        # Map each jmesPath alias to a key in the K8s Secret:
        #
        # - objectName: "db-password"   # matches jmesPath objectAlias above
        #   key: DB_PASSWORD
        # - objectName: "db-user"
        #   key: DB_USER
        # ────────────────────────────────────────────────────────────────────────
{{- end }}
