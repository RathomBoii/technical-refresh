replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent


serviceAccount:
  roleArn: "arn:aws:iam::687069305167:role/prod-helloworld"  # Set in values-dev/prod.yaml — IAM role ARN from terraform output

secrets:
  enabled: false          # Set true once IRSA role + SecretProviderClass exist
  envVars: []             # List of {name, secretName, key} for env vars from K8s Secret
  # Example:
  # envVars:
  #   - name: API_KEY
  #     secretName: helloworld-secrets
  #     key: API_KEY
service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"
