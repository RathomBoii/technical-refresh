# cert-manager Certificate — requests a wildcard TLS cert from Let's Encrypt.
# cert-manager stores the issued cert in the Secret named "traefik-tls" in the traefik namespace.
# Traefik reads this Secret via the IngressRoute tls.secretName field.
#
# Prerequisites:
#   1. cert-manager installed (helm install cert-manager jetstack/cert-manager ...)
#   2. ClusterIssuer "letsencrypt-prod" applied (k8s/manifests/cluster-issuer.yaml)
#   3. HTTP-01 solver: Traefik must handle /.well-known/acme-challenge/ requests
#      on port 80 before the cert is issued
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-tls
  namespace: traefik
spec:
  secretName: traefik-tls   # Traefik IngressRoute references this secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - argocd.wolffialampang.com
    - grafana.wolffialampang.com
    - helloworldapp.wolffialampang.com
    - userapp.wolffialampang.com
    - prometheus.wolffialampang.com
