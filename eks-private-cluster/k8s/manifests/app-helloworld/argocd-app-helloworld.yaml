apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helloworld
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RathomBoii/technical-refresh.git  # HTTPS — use PAT secret
    # repoURL: git@github.com:<your-user>/<your-repo>     # SSH  — use SSH key secret
    targetRevision: main
    path: eks-private-cluster/k8s/charts/helloworld
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod-app
  syncPolicy:
    automated:
      prune: true      # delete resources removed from Git
      selfHeal: true   # revert manual changes made outside Git
    syncOptions:
      - CreateNamespace=true  # auto-create prod-app namespace if not exists
