apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csi-secrets-store
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
    chart: secrets-store-csi-driver
    targetRevision: "1.4.8"
    helm:
      parameters:
        - name: syncSecret.enabled
          value: "true"
        # tokenRequests enables IRSA — CSI driver passes the pod's service account
        # token (audience: sts.amazonaws.com) to the AWS provider so it can assume
        # the IRSA role and call Secrets Manager on behalf of the pod.
        - name: tokenRequests[0].audience
          value: "sts.amazonaws.com"
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # kube-system already exists
