grafana:
  adminPassword: "admin"   # change before deploying to production

  ingress:
    enabled: false   # ingress managed by ingress-rules chart instead
# Why grafana.ingress: false? The kube-prometheus-stack chart can create its own Ingress, but your architecture centralises all Ingress rules in one Helm chart (ingress-rules in Step 6). Disabling Grafana's built-in Ingress avoids duplication and keeps routing in one place.

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

alertmanager:
  enabled: false   # disable for dev — enable when you need alerting
