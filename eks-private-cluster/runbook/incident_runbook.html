const nav = document.getElementById('nav');
const pages = document.getElementById('pages');

RUNBOOKS.forEach((rb, i) => {
  const btn = document.createElement('button');
  btn.className = 'rb-nav-btn' + (i === 0 ? ' active' : '');
  btn.textContent = `${i+1}. ${rb.title}`;
  btn.onclick = () => {
    document.querySelectorAll('.rb-nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.rb-page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(rb.id).classList.add('active');
  };
  nav.appendChild(btn);

  const page = document.createElement('div');
  page.className = 'rb-page' + (i === 0 ? ' active' : '');
  page.id = rb.id;

  const treeHTML = rb.tree.map(n => `
    <div class="tree-node indent-${n.indent} ${n.cls||''}">
      <span class="tree-badge badge-${n.badge}">${n.badge === 'q' ? '?' : n.badge === 'y' ? 'YES' : n.badge === 'n' ? 'NO' : 'FIX'}</span>
      <span>${n.text}</span>
    </div>`).join('');

  const rollbackHTML = rb.rollback.map((s, idx) => `
    <div class="rb-step">
      <div class="rb-step-num">${idx+1}</div>
      <div><div style="margin-bottom:4px;color:var(--color-text-secondary);font-size:13px">${s.text}</div><code>${s.cmd}</code></div>
    </div>`).join('');

  page.innerHTML = `
    <div class="rb-header">
      <div class="rb-header-icon" style="${rb.iconBg}">
        <i class="ti ${rb.icon}" style="font-size:20px;color:var(--color-text-danger)" aria-hidden="true"></i>
      </div>
      <div>
        <h2>${rb.title}</h2>
        <p>${rb.desc}</p>
      </div>
    </div>

    <div class="rb-section">
      <div class="rb-section-title">อาการ</div>
      <div class="symptom-grid">${rb.symptoms.map(s => `
        <div class="symptom-pill"><i class="ti ${s.icon}" aria-hidden="true"></i><span>${s.text}</span></div>`).join('')}
      </div>
    </div>

    <div class="rb-section">
      <div class="rb-section-title">command ตรวจ</div>
      ${rb.commands.map(c => `
        <div class="cmd-block">
          <div class="cmd-label">${c.label}</div>
          <code>${c.code}</code>
        </div>`).join('')}
    </div>

    <div class="rb-section">
      <div class="rb-section-title">decision tree</div>
      <div class="tree-wrap">${treeHTML}</div>
    </div>

    <div class="rb-section">
      <div class="rb-section-title">วิธี rollback</div>
      <div class="rollback-steps">${rollbackHTML}</div>
    </div>

      <div class="rb-section-title">วิธี declare incident</div>
      <div class="incident-card">
        <div class="incident-row">
          <div class="incident-label">Severity</div>
          <div class="incident-val ${rb.incident.sev_cls}">${rb.incident.severity}</div>
        </div>
        <div class="incident-row">
          <div class="incident-label">Trigger เมื่อ</div>
          <div class="incident-val">${rb.incident.trigger}</div>

</script>
